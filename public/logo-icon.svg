<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="100%" height="100%">
  <defs>
    <!-- Dynamic Header Gradient (from-brand-green to-emerald-600) -->
    <linearGradient id="header-shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Floating Nepal Badge Red Gradient -->
    <linearGradient id="nepal-red-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>

    <!-- Glowing effect shadow -->
    <filter id="glow-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Glowing Base Box with Rounded Corners (rounded-xl) -->
  <rect width="140" height="140" x="10" y="10" rx="32" fill="url(#header-shield-grad)" filter="url(#glow-shadow)"/>

  <!-- Inner Lucide Shield Path (scaled to fit center) -->
  <!-- Lucide Shield Path: M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z -->
  <g transform="translate(48, 48) scale(2.66)">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- Nepal Flag Floating Badge (Top Right Corner) -->
  <g transform="translate(118, 6)">
    <!-- Round Badge Container -->
    <circle cx="20" cy="20" r="18" fill="url(#nepal-red-grad)" stroke="#000000" stroke-width="2.5"/>
    
    <!-- Vector Nepal Double-Triangle flag representation -->
    <!-- Scaled to fit neatly inside the 36x36 badge -->
    <path d="M12 9 L28 18 L18 18 L28 29 L12 29 Z" 
          fill="#dc2626" 
          stroke="#ffffff" 
          stroke-width="1.5" 
          stroke-linejoin="round"/>
    
    <!-- Moon & Sun white indicators -->
    <circle cx="16" cy="14" r="1.5" fill="#ffffff"/>
    <path d="M14 23 C14 22, 18 22, 18 23 C18 24.5, 14 24.5, 14 23 Z" fill="#ffffff"/>
  </g>
</svg>
