<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="100%" height="100%">
  <defs>
    <!-- Dynamic Header Gradient (from-brand-green to-emerald-600) -->
    <linearGradient id="header-shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Floating Nepal Badge Red Gradient -->
    <linearGradient id="nepal-red-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>

    <!-- Glowing effect shadow -->
    <filter id="glow-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#22c55e" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ICON LOCKUP (LEFT SIDE) -->
  <g transform="translate(10, 0)">
    <!-- Glowing Base Box with Rounded Corners (rounded-xl) -->
    <rect width="130" height="130" x="10" y="15" rx="30" fill="url(#header-shield-grad)" filter="url(#glow-shadow)"/>

    <!-- Inner Lucide Shield Path -->
    <g transform="translate(45, 50) scale(2.5)">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" 
            fill="none" 
            stroke="#000000" 
            stroke-width="2.5" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
    </g>

    <!-- Nepal Flag Floating Badge (Top Right Corner) -->
    <g transform="translate(112, 10)">
      <circle cx="16" cy="16" r="15" fill="url(#nepal-red-grad)" stroke="#000000" stroke-width="2"/>
      <!-- Nepal Flag Double-Triangle -->
      <path d="M10 8 L24 15 L15 15 L24 24 L10 24 Z" 
            fill="#dc2626" 
            stroke="#ffffff" 
            stroke-width="1.2" 
            stroke-linejoin="round"/>
    </g>
  </g>

  <!-- TYPOGRAPHY / LOGO TEXT (RIGHT SIDE) -->
  <g transform="translate(180, 92)">
    <!-- Brand Name (PROP in White, NEPAL in Brand Green) -->
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="0.5">
      PROP<tspan fill="#22c55e">NEPAL</tspan>
    </text>
    
    <!-- Subtitle (COMMUNITY PLATFORM) -->
    <text y="28" x="2" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="12" fill="#71717a" letter-spacing="4.5">
      COMMUNITY PLATFORM
    </text>
  </g>
</svg>
