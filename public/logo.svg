<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="100%" height="100%">
  <defs>
    <!-- Premium Neon Green/Emerald Gradient for the Alpha symbol -->
    <linearGradient id="alpha-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Subtly glowing border gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#09090b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Shadow filter for the icon container -->
    <filter id="container-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <!-- Glow blur filter for the Alpha symbol glow effect -->
    <filter id="alpha-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ICON LOCKUP (LEFT SIDE) -->
  <g transform="translate(10, 0)">
    <!-- Dark glassmorphism base container card -->
    <rect width="130" height="130" x="10" y="15" rx="34" fill="#09090b" stroke="url(#border-grad)" stroke-width="2" filter="url(#container-shadow)"/>

    <!-- Alpha Vector Path Group -->
    <g transform="translate(5, 5) scale(0.93)" filter="url(#alpha-glow)">
      <!-- Main Alpha Stroke -->
      <path d="M 122,66 C 112,66 94,106 79,106 C 61,106 49,93 49,76 C 49,59 61,46 79,46 C 94,46 112,86 122,116" 
            fill="none" 
            stroke="url(#alpha-grad)" 
            stroke-width="12.5" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
    </g>
  </g>

  <!-- TYPOGRAPHY / LOGO TEXT (RIGHT SIDE) -->
  <g transform="translate(170, 92)">
    <!-- Brand Name (Alpha in White, Journal in Brand Green) -->
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="0.5">
      Alpha<tspan fill="#22c55e">Journal</tspan>
    </text>
    
    <!-- Subtitle (COMMUNITY PLATFORM) -->
    <text y="28" x="2" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="12" fill="#71717a" letter-spacing="4.5">
      COMMUNITY PLATFORM
    </text>
  </g>
</svg>
